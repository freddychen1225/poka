<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Poka 波卡回報</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Poka">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <main id="app-container">
    <div class="header">
      <h1>Poka</h1>
      <p id="system-msg">請點擊下方狀態回報</p>
    </div>
    
    <!-- 5個大方塊按鈕 -->
    <div class="button-grid">
      <button class="btn btn-green" onclick="reportStatus('arrived')">我到了</button>
      <button class="btn btn-blue" onclick="reportStatus('delayed')">我晚一點</button>
      <button class="btn btn-yellow" onclick="reportStatus('with_friend')">跟同學在一起</button>
      <button class="btn btn-orange" onclick="reportStatus('busy')">暫時不方便接</button>
      <!-- SOS 按鈕由 JS 的 touch 事件控制，不需要 onclick -->
      <button class="btn btn-red">SOS 緊急求助</button>
    </div>
  </main>

  <!-- 覆蓋全螢幕的確認視窗 (預設隱藏) -->
  <div id="confirm-modal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="modal-title">確認送出？</h2>
      <p id="modal-desc">您即將傳送狀態與位置給家長</p>
      <div class="modal-buttons">
        <button id="btn-cancel" class="btn-modal cancel">取消</button>
        <button id="btn-confirm" class="btn-modal confirm">確定送出</button>
      </div>
    </div>
  </div>

  <!-- 載入 Supabase 套件與主程式 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

  <!-- 註冊 Service Worker 讓 PWA 生效 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker 註冊成功!', reg))
          .catch(err => console.log('Service Worker 註冊失敗!', err));
      });
    }
  </script>
</body>
</html>
