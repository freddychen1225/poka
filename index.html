<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >
  <title>Poka 波卡回報</title>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Poka">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    :root {
      --bg: #f3f4f6;
      --text: #111827;
      --muted: #6b7280;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.10);
      --radius-xl: 28px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
    }

    #app-container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 18px 20px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 10px 8px 16px;
      flex-shrink: 0;
    }

    .brand-mark {
      display: inline-block;
      font-size: clamp(3rem, 8vw, 4.6rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      margin: 0;
      color: #0f172a;
      text-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
    }

    .brand-sub {
      margin-top: 10px;
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: stretch;
      flex: 1;
    }

    .status-btn {
      appearance: none;
      border: none;
      border-radius: var(--radius-xl);
      min-height: 168px;
      padding: 16px 12px;
      color: #fff;
      font-size: clamp(1.95rem, 5vw, 2.55rem);
      line-height: 1.1;
      font-weight: 900;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
      white-space: normal;
      text-shadow: 0 3px 8px rgba(0, 0, 0, 0.25);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .status-btn:active {
      transform: scale(0.985);
      filter: brightness(0.97);
    }

    .btn-green { background: #3f861d; }
    .btn-blue { background: #126e9f; }
    .btn-yellow { background: #d8a100; }
    .btn-orange { background: #e07a00; }

    .btn-red {
      background: #ab3648;
      grid-column: 1 / -1;
      min-height: 170px;
    }

    .app-footer {
      text-align: center;
      padding: 12px 20px calc(4px + env(safe-area-inset-bottom));
      font-size: 14px;
      color: #64748b;
      font-weight: 600;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.18);
      text-align: center;
    }

    .modal-box h2 {
      margin: 0 0 10px;
      font-size: 26px;
      color: #0f172a;
    }

    .modal-box p {
      margin: 0;
      font-size: 16px;
      color: #475569;
      line-height: 1.6;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .btn-modal {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 14px 12px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-modal.cancel {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btn-modal.confirm {
      background: #0f766e;
      color: #fff;
    }

    @media (max-width: 480px) {
      #app-container {
        padding: 14px 14px 0;
      }

      .header {
        padding: 6px 6px 12px;
      }

      .button-grid {
        gap: 12px;
      }

      .status-btn {
        min-height: 156px;
        font-size: clamp(1.75rem, 6vw, 2.2rem);
        padding: 12px 10px;
        line-height: 1.08;
      }

      .btn-red {
        min-height: 164px;
      }

      .app-footer {
        padding: 10px 16px calc(2px + env(safe-area-inset-bottom));
      }
    }
  </style>
</head>
<body>
  <main id="app-container">
    <div class="header">
      <h1 class="brand-mark">Poka</h1>
      <p id="system-msg" class="brand-sub">請點擊下方狀態回報</p>
    </div>

    <div class="button-grid">
      <button class="status-btn btn-green" onclick="reportStatus('arrived')">
        我到了
      </button>
      <button class="status-btn btn-blue" onclick="reportStatus('delayed')">
        我晚一點
      </button>
      <button class="status-btn btn-yellow" onclick="reportStatus('with_friend')">
        跟同學<br>在一起
      </button>
      <button class="status-btn btn-orange" onclick="reportStatus('busy')">
        暫時<br>不方便接
      </button>
      <button class="status-btn btn-red">
        SOS 緊急求助
      </button>
    </div>
  </main>

  <footer class="app-footer">Freddy &amp; Perplexity 共同協作</footer>

  <div id="confirm-modal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="modal-title">確認送出？</h2>
      <p id="modal-desc">您即將傳送狀態與位置給家長</p>
      <div class="modal-buttons">
        <button id="btn-cancel" class="btn-modal cancel">取消</button>
        <button id="btn-confirm" class="btn-modal confirm">確定送出</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker 註冊成功!', reg))
          .catch(err => console.log('Service Worker 註冊失敗!', err));
      });
    }
  </script>
</body>
</html>
