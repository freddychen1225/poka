<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Poka 家長端 - 狀態監測</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="./manifest-parent.json">
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/parent-apple-touch-icon.png">
  <meta name="theme-color" content="#0f766e">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #f3f4f6;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    }

    body {
      color: #111827;
    }

    .header {
      text-align: center;
      padding: 40px 20px 20px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 34px;
      font-weight: 800;
    }

    .header p {
      margin: 0;
      font-size: 16px;
      color: #4b5563;
    }

    .dashboard {
      padding: 20px;
      padding-bottom: 48px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-sizing: border-box;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      box-sizing: border-box;
    }

    .status-card {
      text-align: center;
    }

    #status-icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 12px;
    }

    #status-text {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    #time-text {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    #detail-text {
      display: none;
      font-size: 16px;
      color: #374151;
      margin-bottom: 18px;
      line-height: 1.6;
      word-break: break-word;
    }

    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 14px;
      color: #111827;
    }

    .meta-text {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
    }

    .action-btn {
      display: block;
      width: 100%;
      padding: 16px;
      background-color: #0b7a80;
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: 800;
      border-radius: 14px;
      text-align: center;
      box-sizing: border-box;
      margin-top: 12px;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .action-btn.disabled {
      background-color: #cbd5e1;
      color: #ffffff;
      pointer-events: none;
    }

    .settings-btn {
      background-color: #3b4b63;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item {
      border: 1px solid #dbe4ee;
      border-radius: 16px;
      padding: 14px;
      background: #f8fafc;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .history-status {
      font-size: 16px;
      font-weight: 800;
      color: #111827;
      line-height: 1.4;
      word-break: break-word;
    }

    .history-time {
      font-size: 13px;
      color: #64748b;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .history-message {
      font-size: 14px;
      color: #334155;
      line-height: 1.6;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .history-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .history-map-link {
      display: inline-block;
      padding: 10px 12px;
      border-radius: 10px;
      background: #e0f2fe;
      color: #075985;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .empty-text {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Poka 家長端</h1>
    <p>隨時掌握孩子的最新動態</p>
  </div>

  <main class="dashboard">
    <section class="card status-card">
      <div id="status-icon">⏳</div>
      <div id="status-text">正在讀取狀態...</div>
      <div id="time-text">--</div>
      <div id="detail-text"></div>

      <a href="#" id="map-link" class="action-btn disabled" target="_blank" rel="noopener noreferrer">
        📍 在地圖上查看
      </a>

      <a href="./parent-setup-push.html" class="action-btn settings-btn">
        🔔 推播通知設定
      </a>
    </section>

    <section class="card">
      <div class="section-title">最後更新</div>
      <div id="last-updated-text" class="meta-text">尚未同步</div>
    </section>

    <section class="card">
      <div class="section-title">最近幾筆回報</div>
      <div id="history-list" class="history-list">
        <div class="empty-text">正在讀取紀錄...</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="parent.js"></script>
</body>
</html>
